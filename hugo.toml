baseURL = "https://hugo-jam.pages.dev/"
title = "Jamyoung's Blog"
theme = "hugo-coder"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false
enableEmoji = true

[pagination]
pagerSize = 6

[markup]
  [markup.highlight]
    noClasses = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
math = true
author = "Jamyoung"
description = "Jamyoung 的个人博客"
keywords = "blog,frontend,vue,uniapp,agent"
info = [
  "前端开发",
  "Vue3 / UniApp",
  "Agent智能体",
  "记录技术与生活"
]

avatarURL = "https://github.com/JamyoungCanton.png"

dateFormat = "2006-01-02"
since = 2026

rtl = false
colorScheme = "auto"
hideColorSchemeToggle = false

maxSeeAlsoItems = 5

customCSS = []
customSCSS = []
customJS = []
customRemoteJS = []

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

[[params.social]]
name = "GitHub"
icon = "fa-brands fa-github fa-2x"
weight = 1
url = "https://github.com/JamyoungCanton/"

[[params.social]]
name = "Email"
icon = "fa-solid fa-envelope fa-2x"
weight = 2
url = "mailto:jamyoung0427@gmail.com"

[[params.social]]
name = "RSS"
icon = "fa-solid fa-rss fa-2x"
weight = 3
url = "/index.xml"
rel = "alternate"
type = "application/rss+xml"

[languages.zh-cn]
languageName = "中文"
title = "Jamyoung's Blog"

